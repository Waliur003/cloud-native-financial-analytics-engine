apiVersion: v1
kind: PersistentVolume
metadata:
  name: finance-local-pv
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/finance-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finance-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi